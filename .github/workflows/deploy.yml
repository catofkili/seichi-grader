name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一个部署，新提交自动取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp commit sha into footer
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "Injecting version: ${SHORT_SHA}"
          sed -i "s/__GIT_SHA__/${SHORT_SHA}/g" index.html
          grep -n "verLink" index.html || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # upload-pages-artifact 默认排除 .git 与 .github，故整站根目录直接上传即可
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
